<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <button class="sidebar-toggle" id="sidebarToggle">
        <i class="fas fa-bars"></i>
    </button>
    <div class="page-container">
        <div id="sidebarOverlay" class="sidebar-overlay"></div>
        <aside class="sidebar">
            <nav>
                <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
                <a href="about.html"><i class="fa-solid fa-receipt"></i> About Us</a>
                <a href="gallery.html" id="profileLink"><i class="fa-regular fa-user"></i> Gallery</a>
                <a href="#" class="active"><i class="fa-solid fa-address-book"></i> Contact Us</a>
                <a href="products.html"><i class="fa-solid fa-truck-fast"></i> Products</a>
            </nav>
        </aside>

        <main class="content">
            
    <h2>Send Us A Message</h2>
    <form action="#" method="post" class="contact-form">
        <div class="form-group">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>

        <fieldset class="form-group">
            <legend>Choose your gender</legend>
            <label><input type="radio" id="male" name="gender" value="male" required> Male</label>
            <label><input type="radio" id="female" name="gender" value="female"> Female</label>
            <label><input type="radio" id="other" name="gender" value="other"> Other</label>
        </fieldset>

        <fieldset class="form-group">
            <legend>Select your interests</legend>
            <label><input type="checkbox" name="interests" value="sports"> Desktops</label>
            <label><input type="checkbox" name="interests" value="music"> Laptops</label>
            <label><input type="checkbox" name="interests" value="reading"> Computer Accessories</label>
        </fieldset>

        <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Enter your message here" required></textarea>
        </div>

        <button type="submit">Send Message</button>
    </form>

    <div>
        <h2>Our Contact Information</h2>
        <p><i class="fa-solid fa-location-dot"></i> 123 Tech Street, Accra, Ghana</p>
        <p><i class="fa-solid fa-phone"></i> +233 243 927 133</p>
        <p><i class="fa-solid fa-envelope"></i> info@ashcomputers.com</p>
    </div>

    <h3>
        Connect with us on social media:
        <a href="https://www.facebook.com/ashcomputers" target="_blank"><i class="fab fa-facebook"></i></a>
        <a href="https://www.twitter.com/ashcomputers" target="_blank"><i class="fab fa-twitter"></i></a>
        <a href="https://www.instagram.com/ashcomputers" target="_blank"><i class="fab fa-instagram"></i></a>
    </h3>
    <div>
        <hr>
        <p>&copy; 2026 Ash Computers. All rights reserved.</p>
    </div>
        </main>
        </div>

    <script>
        // Mobile menu toggle functionality
        const sidebarToggle = document.getElementById('sidebarToggle');
        const pageContainer = document.querySelector('.page-container');
        const sidebarOverlay = document.getElementById('sidebarOverlay');

        sidebarToggle.addEventListener('click', () => {
            pageContainer.classList.toggle('sidebar-open');
        });

        sidebarOverlay.addEventListener('click', () => {
            pageContainer.classList.remove('sidebar-open');
        });
    </script>
</body>
</html>
